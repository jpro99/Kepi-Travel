name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Run typecheck
        run: npm run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-
      - name: Install dependencies
        run: npm ci
      - name: Run adapter tests
        run: npm run test:adapters

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-
      - name: Install dependencies
        run: npm ci
      - name: Run production build
        run: npm run build
      - name: Verify MapLibre CSP worker
        run: test -f public/maplibre-gl-csp-worker.js

  ship-gate:
    name: ship-gate
    needs: [test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Require test and build
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::Ship gate failed — fix tests or build before merge."
            exit 1
          fi
          echo "Ship gate passed (test:adapters + npm run build)."

  notify-failure:
    name: notify-failure
    needs: [test, build, ship-gate]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Notify Sentry
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          DEPLOY_FAILURE_CONTEXT: kepi-travel CI ship-gate
        run: node scripts/notify-deploy-failure.cjs
